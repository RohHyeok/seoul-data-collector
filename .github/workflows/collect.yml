name: Seoul Data Collector

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 🔥 이거 추가

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 실행
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: python collect.py

      - name: 결과 커밋
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.csv
          git commit -m "update data" || echo "no change"
          git push
